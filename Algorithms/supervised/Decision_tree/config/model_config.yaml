paths:
  train_data: data/raw/adult.data
  test_data: data/raw/adult.test
  processed_data: data/processed/cleaned_data.csv
  model_output: models/decision_tree_pipeline.pkl
  report_output: reports/model_report.md
  confusion_matrix_fig: reports/figures/confusion_matrix.png
  feature_importance_fig: reports/figures/feature_importance.png
  tree_visualization_fig: reports/figures/decision_tree_visualization.png

target_column: income

data:
  test_size: 0.2
  random_state: 42

model:
  criterion: gini
  max_depth: 8
  min_samples_split: 20
  min_samples_leaf: 10
  random_state: 42
